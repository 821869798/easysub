name: Rust release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: rust-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install project Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy,rustfmt

      - name: Verify tag and package versions
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          echo "tag version: ${tag_version}"
          echo "Cargo version: ${cargo_version}"
          test "${tag_version}" = "${cargo_version}"

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Validate source
        run: |
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all-targets

  create-release:
    name: Create draft release
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release if needed
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; assets will be replaced."
          else
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --draft \
              --generate-notes \
              --title "easysub ${GITHUB_REF_NAME}"
          fi

  binaries:
    name: Build ${{ matrix.asset }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: easysub-linux-amd64.tar.gz
            kind: unix
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            asset: easysub-linux-arm64.tar.gz
            kind: unix
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset: easysub-macos-amd64.tar.gz
            kind: unix
          - os: macos-15
            target: aarch64-apple-darwin
            asset: easysub-macos-arm64.tar.gz
            kind: unix
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: easysub-windows-amd64.zip
            kind: windows
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Install project Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: ${{ matrix.target }}

      - name: Install musl linker
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes musl-tools
          target_key="$(echo '${{ matrix.target }}' | tr '[:lower:]-' '[:upper:]_')"
          cc_key="$(echo '${{ matrix.target }}' | tr '-' '_')"
          echo "CARGO_TARGET_${target_key}_LINKER=musl-gcc" >> "${GITHUB_ENV}"
          echo "CC_${cc_key}=musl-gcc" >> "${GITHUB_ENV}"

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package Unix release
        if: matrix.kind == 'unix'
        env:
          ASSET: ${{ matrix.asset }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staging/easysub
          cp "target/${TARGET}/release/easysub-rs" staging/easysub/easysub
          cp -R workdir staging/easysub/workdir
          cp README.md LICENSE staging/easysub/
          tar -czf "${ASSET}" -C staging easysub
          shasum -a 256 "${ASSET}" > "${ASSET}.sha256"

      - name: Package Windows release
        if: matrix.kind == 'windows'
        env:
          ASSET: ${{ matrix.asset }}
          TARGET: ${{ matrix.target }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging/easysub | Out-Null
          Copy-Item "target/$env:TARGET/release/easysub-rs.exe" staging/easysub/easysub.exe
          Copy-Item workdir staging/easysub/workdir -Recurse
          Copy-Item README.md,LICENSE staging/easysub/
          Compress-Archive -Path staging/easysub -DestinationPath $env:ASSET -Force
          $hash = (Get-FileHash -Algorithm SHA256 $env:ASSET).Hash.ToLowerInvariant()
          "$hash  $env:ASSET" | Out-File "$env:ASSET.sha256" -Encoding ascii

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET: ${{ matrix.asset }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" \
            "${ASSET}" "${ASSET}.sha256" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

  container:
    name: Publish multi-platform container
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/easysub
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-release:
    name: Publish GitHub release
    needs:
      - binaries
      - container
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release edit "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft=false \
            --latest
